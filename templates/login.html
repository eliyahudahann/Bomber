<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>התחברות</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background-image:url("{{ url_for('static', filename='background-desktop.png') }}");

background-size:cover;

background-position:center;

padding:20px;

}


@media(max-width:768px){

body{

background-image:url("{{ url_for('static', filename='background-mobile.png') }}");

}

}


.login-box{

width:100%;
max-width:430px;

padding:35px;

border-radius:20px;

backdrop-filter:blur(15px);

background:rgba(0,0,0,0.45);

box-shadow:
0 0 25px rgba(0,0,0,.35);

color:white;

}


h1{

text-align:center;

margin-bottom:30px;

font-size:32px;

}


.input-group{

margin-bottom:20px;

}


label{

display:block;

margin-bottom:8px;

font-size:15px;

}


input{

width:100%;

padding:14px;

border:none;

border-radius:12px;

font-size:16px;

outline:none;

}


button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

font-size:18px;

cursor:pointer;

margin-top:15px;

font-weight:bold;

transition:.3s;

}


button:hover{

transform:scale(1.03);

}


.error{

background:#ffcccc;

color:#900;

padding:12px;

border-radius:10px;

margin-bottom:20px;

text-align:center;

}

</style>

</head>


<body>

<div class="login-box">

<h1>
התחברות 🔐 
</h1>

{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

<form method="POST">

<div class="input-group">

<label>
שם משתמש
</label>

<input
type="text"
name="username"
placeholder="שם משתמש"
required>

</div>


<div class="input-group">

<label>
סיסמה
</label>

<input
type="password"
name="password"
placeholder="סיסמה"
required>

</div>


<button type="submit">

התחבר

</button>

</form>

</div>

</body>
</html>
